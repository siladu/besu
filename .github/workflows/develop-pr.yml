name: docker develop build and test only

on:
  pull_request:
    branches:
      - main
      - release-*
      - verkle
      - performance

jobs:
  hadolint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: hadoLint
        run: docker run --rm -i hadolint/hadolint < docker/Dockerfile

  buildDocker:
    needs: hadolint
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        platform:
          - ubuntu-latest
          - besu-arm64
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Prepare
        id: prep
        run: |
          platform=${{ matrix.platform }}
          if [ "$platform" = 'ubuntu-latest' ]; then 
            echo "PLATFORM_PAIR=linux-amd64" >> $GITHUB_OUTPUT
            echo "ARCH=amd64" >> $GITHUB_OUTPUT
          else
            echo "PLATFORM_PAIR=linux-arm64" >> $GITHUB_OUTPUT
            echo "ARCH=arm64" >> $GITHUB_OUTPUT
          fi
          echo "build-date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1
        with:
          cache-disabled: true

      - name: Stage Docker build context
        run: ./gradlew --no-daemon distDockerCopy

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and load for testing
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: build/docker-besu
          load: true
          build-args: |
            VERSION=dev-pr
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.prep.outputs.build-date }}
          tags: hyperledger/besu:test-${{ steps.prep.outputs.ARCH }}
          cache-from: type=gha,scope=develop-pr-build-${{ steps.prep.outputs.ARCH }}
          cache-to: type=gha,mode=max,scope=develop-pr-build-${{ steps.prep.outputs.ARCH }}

      - name: Download Goss binaries
        run: ./gradlew --no-daemon downloadGossBinaries

      - name: Run Docker tests
        env:
          architecture: ${{ steps.prep.outputs.ARCH }}
        run: |
          mkdir -p docker/reports
          cd docker && ./test.sh hyperledger/besu:test-${{ steps.prep.outputs.ARCH }}
