name: Docker Build and Test

on:
  workflow_call:
    inputs:
      version:
        description: 'Version string for the docker image (e.g. dev-pr, 26.5-develop-abc1234)'
        required: true
        type: string
      push:
        description: 'Whether to push images by digest after testing'
        required: false
        type: boolean
        default: false
      cache_scope:
        description: 'GHA cache scope prefix to avoid collisions between callers'
        required: false
        type: string
        default: 'docker-build'

env:
  registry: docker.io

jobs:
  hadolint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: hadoLint
        run: docker run --rm -i hadolint/hadolint < docker/Dockerfile

  buildDocker:
    needs: hadolint
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        platform:
          - ubuntu-latest
          - besu-arm64
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Prepare
        id: prep
        run: |
          platform=${{ matrix.platform }}
          if [ "$platform" = 'ubuntu-latest' ]; then
            echo "PLATFORM_PAIR=linux-amd64" >> $GITHUB_OUTPUT
            echo "ARCH=amd64" >> $GITHUB_OUTPUT
          else
            echo "PLATFORM_PAIR=linux-arm64" >> $GITHUB_OUTPUT
            echo "ARCH=arm64" >> $GITHUB_OUTPUT
          fi
          echo "build-date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1
        with:
          cache-disabled: true

      - name: Stage Docker build context
        run: ./gradlew --no-daemon distDockerCopy

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to ${{ env.registry }}
        if: ${{ inputs.push }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.registry }}
          username: ${{ secrets.DOCKER_USER_RW }}
          password: ${{ secrets.DOCKER_PASSWORD_RW }}

      - name: Build and load for testing
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: build/docker-besu
          load: true
          build-args: |
            VERSION=${{ inputs.version }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.prep.outputs.build-date }}
          tags: hyperledger/besu:test-${{ steps.prep.outputs.ARCH }}
          cache-from: type=gha,scope=${{ inputs.cache_scope }}-${{ steps.prep.outputs.ARCH }}
          cache-to: type=gha,mode=max,scope=${{ inputs.cache_scope }}-${{ steps.prep.outputs.ARCH }}

      - name: Download Goss binaries
        run: |
          GOSS_VERSION="v0.4.9"
          ARCH=${{ steps.prep.outputs.ARCH }}
          TEST_DIR="docker/tests"

          if [ ! -f "${TEST_DIR}/goss-linux-${ARCH}" ]; then
            echo "Downloading goss-linux-${ARCH}..."
            curl -fsSL "https://github.com/goss-org/goss/releases/download/${GOSS_VERSION}/goss-linux-${ARCH}" \
              -o "${TEST_DIR}/goss-linux-${ARCH}"
            chmod +x "${TEST_DIR}/goss-linux-${ARCH}"
          else
            echo "goss-linux-${ARCH} already exists"
          fi

          if [ ! -f "${TEST_DIR}/dgoss" ]; then
            echo "Downloading dgoss..."
            curl -fsSL "https://github.com/goss-org/goss/releases/download/${GOSS_VERSION}/dgoss" \
              -o "${TEST_DIR}/dgoss"
            chmod +x "${TEST_DIR}/dgoss"
          else
            echo "dgoss already exists"
          fi

      - name: Run Docker tests
        env:
          architecture: ${{ steps.prep.outputs.ARCH }}
        run: |
          mkdir -p docker/reports
          cd docker && ./test.sh hyperledger/besu:test-${{ steps.prep.outputs.ARCH }}

      # Second build re-uses the GHA cache from the load step above, so it
      # should be near-instant. We need a separate invocation because
      # `load: true` (used for local testing) and `push-by-digest` are
      # mutually exclusive in docker/build-push-action.
      - name: Push by digest
        if: ${{ inputs.push }}
        id: push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: build/docker-besu
          platforms: linux/${{ steps.prep.outputs.ARCH }}
          provenance: false
          build-args: |
            VERSION=${{ inputs.version }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.prep.outputs.build-date }}
          outputs: type=image,name=${{ env.registry }}/${{ secrets.DOCKER_ORG }}/besu,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ inputs.cache_scope }}-${{ steps.prep.outputs.ARCH }}

      - name: Export digest
        if: ${{ inputs.push }}
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        if: ${{ inputs.push }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: digests-${{ steps.prep.outputs.ARCH }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1
